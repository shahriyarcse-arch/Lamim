  <!-- Tagline: Think • Plan • Achieve -->
  <text x="215" y="152" font-family="'Manrope', 'Satoshi', sans-serif" font-weight="600" font-size="16" letter-spacing="3" fill="#74C365">Think • Plan • Achieve</text>
</svg>
