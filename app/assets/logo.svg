<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <defs>
    <!-- Facet 1: Vertical Stem Gradient (#97D84C -> #74C365) -->
    <linearGradient id="logoV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#97D84C"/>
      <stop offset="100%" stop-color="#74C365"/>
    </linearGradient>
    <!-- Facet 2: Front Fold Gradient (#B5EB67 -> #69B82A) -->
    <linearGradient id="logoF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B5EB67"/>
      <stop offset="50%" stop-color="#97D84C"/>
      <stop offset="100%" stop-color="#69B82A"/>
    </linearGradient>
    <!-- Facet 3: Shadow / Underfold (#3D7812 -> #1D420E) -->
    <linearGradient id="logoS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D7812" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1D420E" stop-opacity="0.98"/>
    </linearGradient>
    <!-- Facet 4: Horizontal Base (#8ED83E -> #B5EB67) -->
    <linearGradient id="logoH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ED83E"/>
      <stop offset="100%" stop-color="#B5EB67"/>
    </linearGradient>
    <!-- Specular Highlight -->
    <linearGradient id="logoSp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow and Drop Shadow -->
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#112218" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#74C365" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 3D Folded Ribbon L Icon -->
  <g transform="translate(20, 10) scale(0.38)" filter="url(#logoShadow)">
    <path d="M140,115 C140,82 172,60 205,75 L240,92 C252,98 252,112 252,122 L252,325 L140,375Z" fill="url(#logoV)"/>
    <path d="M175,255 L252,300 L252,385 L175,340Z" fill="url(#logoS)"/>
    <path d="M140,195 C140,182 150,175 162,180 L252,130 L252,325 L140,375Z" fill="url(#logoF)" opacity="0.97"/>
    <path d="M140,195 L252,130 L232,118 L140,172Z" fill="url(#logoSp)" opacity="0.85"/>
    <path d="M175,300 L350,300 C382,300 400,320 400,344 C400,368 382,385 350,385 L175,385Z" fill="url(#logoH)"/>
    <path d="M175,300 L355,300 C367,300 376,307 376,314 L175,314Z" fill="url(#logoSp)" opacity="0.5"/>
  </g>

  <!-- Wordmark "lamim" -->
