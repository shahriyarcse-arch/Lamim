    <!-- l -->
    <path d="M 215,62 C 215,56 219,52 225,52 C 231,52 235,56 235,62 L 235,114 C 235,120 231,124 225,124 C 219,124 215,120 215,114 Z"/>
    <!-- a -->
    <path d="M 278,74 C 265,74 254,84 254,99 C 254,114 265,125 278,125 C 286,125 292,121 296,115 L 296,119 C 296,123 299,125 303,125 C 308,125 311,123 311,119 L 311,81 C 311,76 307,74 303,74 C 299,74 296,76 296,80 L 296,83 C 292,77 286,74 278,74 Z M 281,88 C 290,88 296,94 296,100 C 296,107 290,113 281,113 C 273,113 267,107 267,100 C 267,94 273,88 281,88 Z"/>
    <!-- m -->
    <path d="M 328,76 C 332,76 335,78 336,83 C 340,77 347,74 355,74 C 362,74 368,78 371,84 C 375,77 383,74 391,74 C 401,74 408,81 408,92 L 408,119 C 408,123 405,125 401,125 C 397,125 394,123 394,119 L 394,93 C 394,87 389,84 384,84 C 378,84 373,88 373,94 L 373,119 C 373,123 370,125 366,125 C 362,125 359,123 359,119 L 359,93 C 359,87 354,84 349,84 C 343,84 338,88 338,94 L 338,119 C 338,123 335,125 331,125 C 327,125 324,123 324,119 L 324,81 C 324,78 326,76 328,76 Z"/>
    <!-- i -->
    <path d="M 425,76 C 429,76 432,78 432,82 L 432,119 C 432,123 429,125 425,125 C 421,125 418,123 418,119 L 418,82 C 418,78 421,76 425,76 Z"/>
    <!-- m -->
    <path d="M 445,76 C 449,76 452,78 453,83 C 457,77 464,74 472,74 C 479,74 485,78 488,84 C 492,77 500,74 508,74 C 518,74 525,81 525,92 L 525,119 C 525,123 522,125 518,125 C 514,125 511,123 511,119 L 511,93 C 511,87 506,84 501,84 C 495,84 490,88 490,94 L 490,119 C 490,123 487,125 483,125 C 479,125 476,123 476,119 L 476,93 C 476,87 471,84 466,84 C 460,84 455,88 455,94 L 455,119 C 455,123 452,125 448,125 C 444,125 441,123 441,119 L 441,81 C 441,78 443,76 445,76 Z"/>
