<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lamim Icon Generator</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a855f7 0%, #4f46e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .preview-box {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .preview-box svg {
      width: 90px;
      height: 90px;
    }
    button {
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(139, 92, 246, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .sizes-list {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }
    .size-tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 11px;
      font-weight: 600;
      color: #cbd5e1;
      padding: 6px 12px;
      border-radius: 20px;
    }
    .status {
      font-size: 13px;
      color: #34c759;
      margin-top: 16px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="preview-box">
      <!-- Master SVG Logo inline -->
      <svg id="master-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
        <defs>
          <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5" />
            <stop offset="100%" stop-color="#a855f7" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <rect width="512" height="512" rx="112" fill="url(#bg)" />
        <path d="M336 344c-70.69 0-128-57.31-128-128 0-31.14 11.23-59.62 30-81.82-74.05 10.55-130 74.2-130 151.82 0 83.95 68.05 152 152 152 77.62 0 141.27-55.95 151.82-130-22.2 18.77-50.68 30-81.82 30z" 
              fill="#ffffff" 
              opacity="0.95" 
              filter="url(#glow)"/>
        <path d="M256 128l16 48 48 16-48 16-16 48-16-48-48-16 48-16z" 
              fill="#fcd34d" 
              filter="url(#glow)" />
        <path d="M368 180l10 30 30 10-30 10-10 30-10-30-30-10 30-10z" 
              fill="#fde68a" 
              opacity="0.8" 
              filter="url(#glow)" />
      </svg>
    </div>
    <h1>Generate PWA Icons</h1>
    <p>This tool converts your master SVG logo into the required PNG sizes. Double-click this file to open it in your browser, then click below.</p>
    
    <button onclick="generateIcons()">Generate & Download All PNGs</button>
    <div class="status" id="status-msg">✓ 4 PNG Icons successfully downloaded!</div>
    
    <div class="sizes-list">
      <span class="size-tag">32x32</span>
      <span class="size-tag">180x180</span>
      <span class="size-tag">192x192</span>
      <span class="size-tag">512x512</span>
    </div>
  </div>

  <script>
    async function generateIcons() {
      const svgEl = document.getElementById('master-logo');
      const svgText = new XMLSerializer().serializeToString(svgEl);
      
      const targets = [
        { size: 32, name: 'icon-32x32.png' },
        { size: 180, name: 'icon-180x180.png' },
        { size: 192, name: 'icon-192x192.png' },
        { size: 512, name: 'icon-512x512.png' }
      ];
      
      for (const target of targets) {
        await convertAndDownload(svgText, target.size, target.name);
      }
      
      document.getElementById('status-msg').style.display = 'block';
    }

    function convertAndDownload(svgText, size, filename) {
      return new Promise((resolve) => {
        const parser = new DOMParser();
        const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
        const svgEl = svgDoc.documentElement;
        
        svgEl.setAttribute('width', size);
        svgEl.setAttribute('height', size);
        
        const serializedSvg = new XMLSerializer().serializeToString(svgEl);
        const svgBlob = new Blob([serializedSvg], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(img, 0, 0, size, size);
          
          canvas.toBlob((blob) => {
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            URL.revokeObjectURL(url);
            URL.revokeObjectURL(downloadUrl);
            resolve();
          }, 'image/png');
        };
        img.src = url;
      });
    }
  </script>
</body>
</html>
